<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover - SpurtLinks</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: 240 6% 4%;
            --foreground: 0 0% 98%;
            --card: 240 6% 10%;
            --card-foreground: 0 0% 98%;
            --popover: 240 6% 10%;
            --popover-foreground: 0 0% 98%;
            --primary: 350 89% 60%;
            --primary-foreground: 0 0% 100%;
            --secondary: 240 4% 16%;
            --secondary-foreground: 0 0% 98%;
            --muted: 240 4% 16%;
            --muted-foreground: 240 5% 64.9%;
            --accent: 83 78% 68%;
            --accent-foreground: 0 0% 0%;
            --border: 240 4% 16%;
            --input: 240 4% 16%;
            --ring: 350 89% 60%;
            
            --background-rgb: 10, 10, 15;
            --card-rgb: 26, 26, 35;
            --muted-rgb: 40, 40, 50;
            
            --rose-500: #ec4899;
            --lime-400: #bef264;
            --orange-400: #fb923c;
            --blue-400: #60a5fa;
            --purple-500: #a855f7;
            --amber-500: #f59e0b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 80px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 40;
            display: flex;
            flex-direction: column;
            border-right: 1px solid hsla(var(--border), 0.5);
            background: hsla(var(--card), 0.5);
            backdrop-filter: blur(20px);
        }

        .logo-area {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid hsla(var(--border), 0.5);
        }

        .logo {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: linear-gradient(to bottom right, var(--rose-500), var(--orange-400));
            box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.25);
            color: white;
        }

        .logo svg {
            width: 24px;
            height: 24px;
        }

        .nav-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 24px 0;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            color: hsl(var(--muted-foreground));
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: hsl(var(--muted));
            color: hsl(var(--foreground));
        }

        .nav-item.active {
            background: hsla(350, 89%, 60%, 0.1);
            color: hsl(var(--primary));
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            width: 4px;
            height: 32px;
            border-radius: 0 4px 4px 0;
            background: hsl(var(--primary));
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .nav-item .tooltip {
            position: absolute;
            left: 100%;
            margin-left: 12px;
            padding: 6px 12px;
            background: hsl(var(--popover));
            color: hsl(var(--popover-foreground));
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 50;
            border: 1px solid hsla(var(--border), 0.5);
        }

        .nav-item:hover .tooltip {
            opacity: 1;
        }

        .settings-area {
            padding: 16px;
            border-top: 1px solid hsla(var(--border), 0.5);
        }

        .main-wrapper {
            flex: 1;
            margin-left: 80px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .discover-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid hsla(var(--border), 0.5);
            background: hsla(var(--background), 0.8);
            backdrop-filter: blur(20px);
            padding: 20px 24px;
            flex-shrink: 0;
        }

        .header-title h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: hsl(var(--foreground));
            margin-bottom: 4px;
        }

        .header-title p {
            font-size: 14px;
            color: hsl(var(--muted-foreground));
        }

        .filter-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid hsla(var(--border), 0.5);
            background: transparent;
            color: hsl(var(--muted-foreground));
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-button:hover {
            background: hsl(var(--muted));
            color: hsl(var(--foreground));
        }

        .filter-button svg {
            width: 20px;
            height: 20px;
        }

        .card-stack {
            flex: 1;
            overflow: hidden;
            padding: 24px;
        }

        .card-container {
            position: relative;
            margin: 0 auto;
            height: 100%;
            max-width: 400px;
        }

        .swipe-card {
            position: absolute;
            height: 100%;
            width: 100%;
            cursor: grab;
            user-select: none;
        }

        .swipe-card:active {
            cursor: grabbing;
        }

        .card-inner {
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
            border-radius: 24px;
            background: hsl(var(--card));
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .card-photo {
            position: relative;
            height: 100%;
            width: 100%;
        }

        .card-photo img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        .photo-indicators {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            gap: 4px;
            z-index: 10;
        }

        .indicator {
            height: 4px;
            flex: 1;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.4);
        }

        .indicator.active {
            background: white;
        }

        .photo-nav {
            position: absolute;
            inset: 0;
            display: flex;
            z-index: 5;
        }

        .nav-prev, .nav-next {
            height: 100%;
            width: 50%;
        }

        .gradient-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.2), transparent);
            pointer-events: none;
            z-index: 10;
        }

        .like-indicator {
            position: absolute;
            top: 32px;
            right: 32px;
            border: 4px solid var(--lime-400);
            border-radius: 12px;
            padding: 8px 16px;
            z-index: 20;
            opacity: 0;
        }

        .like-indicator span {
            font-size: 24px;
            font-weight: 700;
            color: var(--lime-400);
        }

        .nope-indicator {
            position: absolute;
            top: 32px;
            left: 32px;
            border: 4px solid var(--rose-500);
            border-radius: 12px;
            padding: 8px 16px;
            z-index: 20;
            opacity: 0;
        }

        .nope-indicator span {
            font-size: 24px;
            font-weight: 700;
            color: var(--rose-500);
        }

        .user-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            z-index: 20;
        }

        .user-info-main {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-name h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: white;
        }

        .verified-badge {
            width: 24px;
            height: 24px;
            color: #60a5fa;
            fill: #60a5fa;
        }

        .user-location {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.8);
        }

        .user-location svg {
            width: 16px;
            height: 16px;
        }

        .online-badge {
            background: rgba(190, 242, 100, 0.2);
            color: var(--lime-400);
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 8px;
        }

        .user-bio {
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.9);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .user-interests {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .interest-tag {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            border: none;
        }

        .info-button {
            margin-left: 16px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }

        .info-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .info-button svg {
            width: 24px;
            height: 24px;
        }

        .action-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding-bottom: 32px;
            flex-shrink: 0;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid;
            background: transparent;
        }

        .action-btn.small {
            width: 48px;
            height: 48px;
        }

        .action-btn.medium {
            width: 56px;
            height: 56px;
        }

        .action-btn.large {
            width: 64px;
            height: 64px;
        }

        .action-btn.undo {
            border-color: var(--amber-500);
            color: var(--amber-500);
        }

        .action-btn.undo:hover {
            background: rgba(245, 158, 11, 0.1);
        }

        .action-btn.dislike {
            border-color: var(--rose-500);
            color: var(--rose-500);
        }

        .action-btn.dislike:hover {
            background: var(--rose-500);
            color: white;
        }

        .action-btn.superlike {
            border-color: var(--blue-400);
            color: var(--blue-400);
        }

        .action-btn.superlike:hover {
            background: rgba(96, 165, 250, 0.1);
        }

        .action-btn.like {
            border: none;
            background: var(--lime-400);
            color: black;
            box-shadow: 0 10px 15px -3px rgba(190, 242, 100, 0.25);
        }

        .action-btn.like:hover {
            background: #a3e635;
        }

        .action-btn.boost {
            border-color: var(--purple-500);
            color: var(--purple-500);
        }

        .action-btn.boost:hover {
            background: rgba(168, 85, 247, 0.1);
        }

        .action-btn svg {
            width: 24px;
            height: 24px;
        }

        .action-btn.large svg {
            width: 32px;
            height: 32px;
        }

        .action-btn.small svg {
            width: 20px;
            height: 20px;
        }

        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: none;
        }

        .sheet-overlay.active {
            display: block;
        }

        .sheet {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 100%;
            max-width: 400px;
            background: hsl(var(--background));
            border-left: 1px solid hsla(var(--border), 0.5);
            z-index: 51;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .sheet.active {
            transform: translateX(0);
        }

        .sheet-header {
            padding: 24px;
            border-bottom: 1px solid hsla(var(--border), 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sheet-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: hsl(var(--foreground));
        }

        .sheet-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: hsl(var(--muted));
            border: none;
            color: hsl(var(--foreground));
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .sheet-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .filter-section {
            margin-bottom: 32px;
        }

        .filter-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: hsl(var(--foreground));
            margin-bottom: 12px;
        }

        .slider {
            width: 100%;
            height: 4px;
            background: hsl(var(--muted));
            border-radius: 2px;
            position: relative;
        }

        .slider-fill {
            position: absolute;
            height: 100%;
            background: hsl(var(--primary));
            border-radius: 2px;
        }

        .slider-values {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: hsl(var(--muted-foreground));
        }

        .select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid hsla(var(--border), 0.5);
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            font-size: 14px;
            margin-top: 8px;
        }

        .apply-btn {
            width: 100%;
            padding: 12px;
            border-radius: 9999px;
            background: hsl(var(--primary));
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin-top: 32px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .empty-icon {
            width: 96px;
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: hsla(350, 89%, 60%, 0.1);
            margin-bottom: 24px;
            color: hsl(var(--primary));
        }

        .empty-icon svg {
            width: 48px;
            height: 48px;
        }

        .empty-state h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: hsl(var(--foreground));
            margin-bottom: 8px;
        }

        .empty-state p {
            color: hsl(var(--muted-foreground));
            font-size: 14px;
            margin-bottom: 24px;
        }

        .refresh-btn {
            padding: 12px 24px;
            border-radius: 9999px;
            background: hsl(var(--primary));
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area">
            <a href="#" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>

        <nav class="nav-menu">

            <a href="#" class="nav-item">

                </svg>
                <span class="tooltip">Settings</span>

        </div>
    </aside>

    <div class="main-wrapper">
        <header class="discover-header">
            <div class="header-title">

                                            <span class="interest-tag">Coffee</span>
                                            <span class="interest-tag">Hiking</span>
                                            <span class="interest-tag">Photography</span>
                                        </div>
                                    </div>
                                    
                                    <button class="info-button">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"/>
                                            <line x1="12" y1="16" x2="12" y2="12"/>
                                            <circle cx="12" cy="8" r="1" fill="currentColor"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="swipe-card" style="z-index: 2; transform: translateY(10px) scale(0.95);">
                    <div class="card-inner">
                        <div class="card-photo">
                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=600&fit=crop" alt="Emma">
                            <div class="gradient-overlay"></div>
                        </div>
                    </div>
                </div>

                <div class="swipe-card" style="z-index: 1; transform: translateY(20px) scale(0.9);">
                    <div class="card-inner">
                        <div class="card-photo">
                            <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&h=600&fit=crop" alt="Lisa">
                            <div class="gradient-overlay"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn small undo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h13a5 5 0 0 1 0 10H7"/>
                    <path d="M3 12l4-4M3 12l4 4"/>
                </svg>
            </button>
            
            <button class="action-btn large dislike">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            
            <button class="action-btn medium superlike">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
            </button>
            
            <button class="action-btn large like">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
            </button>
            
            <button class="action-btn small boost">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeFilter()"></div>
    <div class="sheet" id="filterSheet">
        <div class="sheet-header">
            <h2>Filters</h2>
            <button class="sheet-close" onclick="closeFilter()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="sheet-content">
            <div class="filter-section">
                <label class="filter-label">Age Range: 18 - 35</label>
                <div class="slider">
                    <div class="slider-fill" style="width: 50%;"></div>
                </div>
                <div class="slider-values">
                    <span>18</span>
                    <span>35</span>
                </div>
            </div>
            
            <div class="filter-section">
                <label class="filter-label">Maximum Distance: 50 km</label>
                <div class="slider">
                    <div class="slider-fill" style="width: 50%;"></div>
                </div>
                <div class="slider-values">
                    <span>1 km</span>
                    <span>100 km</span>
                </div>
            </div>
            
            <div class="filter-section">
                <label class="filter-label">Show me</label>
                <select class="select">
                    <option>Everyone</option>
                    <option>Women</option>
                    <option>Men</option>
                    <option>Non-binary</option>
                </select>
            </div>
            
            <button class="apply-btn" onclick="closeFilter()">Apply Filters</button>
        </div>
    </div>

    <script>
        function toggleFilter() {
            document.getElementById('filterSheet').classList.add('active');
            document.getElementById('sheetOverlay').classList.add('active');
        }

        function closeFilter() {
            document.getElementById('filterSheet').classList.remove('active');
            document.getElementById('sheetOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
