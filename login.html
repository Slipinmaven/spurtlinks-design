<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In - SpurtLinks</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --background: 0, 0%, 100%;
        --foreground: 240, 10%, 4%;
        --card: 0, 0%, 100%;
        --card-foreground: 240, 10%, 4%;
        --popover: 0, 0%, 100%;
        --popover-foreground: 240, 10%, 4%;
        --primary: 350, 89%, 60%;
        --primary-foreground: 0, 0%, 100%;
        --secondary: 240, 5%, 96%;
        --secondary-foreground: 240, 6%, 10%;
        --muted: 240, 5%, 96%;
        --muted-foreground: 240, 4%, 46%;
        --accent: 83, 78%, 68%;
        --accent-foreground: 0, 0%, 0%;
        --destructive: 0, 84%, 60%;
        --destructive-foreground: 0, 0%, 98%;
        --border: 240, 6%, 90%;
        --input: 240, 6%, 90%;
        --ring: 350, 89%, 60%;
        --radius: 0.75rem;
        --rose: 350, 89%, 60%;
        --lime: 83, 78%, 68%;
        --rose-500: #ec4899;
        --orange-400: #fb923c;
      }

      .dark {
        --background: 240, 6%, 4%;
        --foreground: 0, 0%, 98%;
        --card: 240, 6%, 10%;
        --card-foreground: 0, 0%, 98%;
        --popover: 240, 6%, 10%;
        --popover-foreground: 0, 0%, 98%;
        --primary: 350, 89%, 60%;
        --primary-foreground: 0, 0%, 100%;
        --secondary: 240, 4%, 16%;
        --secondary-foreground: 0, 0%, 98%;
        --muted: 240, 4%, 16%;
        --muted-foreground: 240, 5%, 65%;
        --accent: 83, 78%, 68%;
        --accent-foreground: 0, 0%, 0%;
        --destructive: 0, 63%, 31%;
        --destructive-foreground: 0, 0%, 98%;
        --border: 240, 4%, 16%;
        --input: 240, 4%, 16%;
        --ring: 350, 89%, 60%;
      }

      html {
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: "Outfit", sans-serif;
      }

      body {
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      .login-container {
        display: flex;
        min-height: 100vh;
      }

      .login-form-side {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 48px;
        background: hsl(var(--card));
      }

      @media (max-width: 1024px) {
        .login-form-side {
          padding: 32px;
        }
      }

      .form-content {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
      }

      .logo-section {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: hsl(var(--foreground));
        margin-bottom: 48px;
      }

      .logo-icon img {
        width: 40px;
        height: 40px;
      }
      .logo-text {
        font-size: 24px;
        font-weight: 700;
        font-family: "Outfit", sans-serif;
      }

      .form-header {
        margin-bottom: 32px;
      }

      .form-header h1 {
        font-size: 36px;
        font-weight: 700;
        margin-bottom: 8px;
        color: hsl(var(--foreground));
      }

      .form-header p {
        font-size: 16px;
        color: hsl(var(--muted-foreground));
      }

      .form-group {
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: hsl(var(--foreground));
      }

      .input-wrapper {
        position: relative;
      }

      input {
        width: 100%;
        padding: 12px 48px 12px 12px;
        border: 2px solid hsl(var(--border));
        border-radius: 12px;
        background: hsl(var(--muted));
        color: hsl(var(--foreground));
        font-family: inherit;
        font-size: 14px;
        transition: all 0.3s;
      }

      input:focus {
        outline: none;
        border-color: hsl(var(--primary));
        background: hsl(var(--card));
      }

      input.valid {
        border-color: #10b981;
      }

      input.invalid {
        border-color: #ef4444;
      }

      input.pending {
        border-color: #f59e0b;
      }

      .input-icon {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        color: hsl(var(--muted-foreground));
      }

      .input-icon.valid {
        color: #10b981;
      }

      .input-icon.invalid {
        color: #ef4444;
      }

      .input-icon.pending {
        color: #f59e0b;
      }

      .input-note {
        font-size: 12px;
        margin-top: 6px;
        color: hsl(var(--muted-foreground));
      }

      .password-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .forgot-password {
        font-size: 14px;
        color: hsl(var(--primary));
        text-decoration: none;
        transition: color 0.3s;
      }

      .forgot-password:hover {
        color: #be185d;
      }

      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: hsl(var(--muted-foreground));
        font-size: 16px;
        transition: color 0.3s;
      }

      .password-toggle:hover {
        color: hsl(var(--foreground));
      }

      .error-message {
        font-size: 12px;
        color: #ef4444;
        margin-top: 6px;
      }

      .submit-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        background: linear-gradient(135deg, var(--rose-500), var(--orange-400));
        color: white;
        box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .submit-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 15px 35px -5px rgba(236, 72, 153, 0.35);
      }

      .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid white;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .signup-link {
        margin-top: 32px;
        text-align: center;
        font-size: 14px;
        color: hsl(var(--muted-foreground));
      }

      .signup-link a {
        color: hsl(var(--primary));
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s;
      }

      .signup-link a:hover {
        color: #be185d;
      }

      .login-image-side {
        flex: 1;
        position: relative;
        display: none;
        overflow: hidden;
      }

      @media (min-width: 1024px) {
        .login-image-side {
          display: block;
        }
      }

      .login-image-side img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .image-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.6),
          rgba(0, 0, 0, 0)
        );
      }

      .image-content {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        text-align: center;
      }

      .image-content h2 {
        font-size: 32px;
        font-weight: 700;
        color: white;
        margin-bottom: 16px;
        font-family: "Outfit", sans-serif;
      }

      .image-content p {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.8);
      }

      .theme-toggle {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: hsl(var(--muted));
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        transition: all 0.3s;
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 40;
        color: hsl(var(--foreground));
      }

      .theme-toggle:hover {
        background: hsl(var(--card));
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <!-- Form Side -->
      <div class="login-form-side">
        <div class="form-content">
          <a href="landing.html" class="logo-section">
            <div class="logo-icon">
              <img src="logo.png" alt="logo" />
            </div>
            <span class="logo-text">SpurtLinks</span>
          </a>

          <div class="form-header">
            <h1>Welcome back</h1>
            <p>Sign in to continue finding your match</p>
          </div>

          <form id="loginForm">
            <div class="form-group">
              <label for="contact">Email or Phone Number</label>
              <div class="input-wrapper">
                <input
                  type="text"
                  id="contact"
                  placeholder="email@example.com or +254712345678"
                  autocomplete="off"
                />
                <i class="fas fa-user input-icon"></i>
              </div>
              <div class="input-note">
                <span id="contactNote"></span>
              </div>
              <div class="error-message" id="contactError"></div>
            </div>

            <div class="form-group">
              <div class="password-header">
                <label for="password">Password</label>
                <a href="forgot-password.html" class="forgot-password"
                  >Forgot password?</a
                >
              </div>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="password"
                  placeholder="Enter your password"
                  autocomplete="off"
                />
                <button
                  type="button"
                  class="password-toggle"
                  id="passwordToggle"
                  onclick="togglePassword()"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
              Log In
              <i class="fas fa-arrow-right"></i>
            </button>
          </form>

          <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign up</a>
          </div>
        </div>
      </div>

      <!-- Image Side -->
      <div class="login-image-side">
        <img
          src="https://images.unsplash.com/photo-1758272133818-4ade82a260df?w=1200&h=1600&fit=crop"
          alt="Dating"
        />
        <div class="image-overlay"></div>
        <div class="image-content">
          <div>
            <h2>Welcome Back</h2>
            <p>Continue your journey to find the perfect match</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const contactInput = document.getElementById("contact");
      const passwordInput = document.getElementById("password");
      const contactError = document.getElementById("contactError");
      const passwordError = document.getElementById("passwordError");
      const contactNote = document.getElementById("contactNote");
      const loginForm = document.getElementById("loginForm");
      const submitBtn = document.getElementById("submitBtn");

      function detectContactType(value) {
        if (!value) return null;

        const firstChar = value.charAt(0);

        if (firstChar === "+") {
          const cleaned = value.replace(/[\s-]/g, "");
          if (/^\+[1-9][0-9]*$/.test(cleaned)) {
            const digitCount = cleaned.replace(/\D/g, "").length;
            if (digitCount >= 8 && digitCount <= 15) {
              return "phone";
            }
            return "phone_pending";
          }
          return "invalid";
        }

        if (/[a-zA-Z]/.test(firstChar)) {
          if (value.includes("@") && value.includes(".")) {
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
            return isEmail ? "email" : "email_pending";
          }
          return "email_pending";
        }

        if (/[0-9]/.test(firstChar)) {
          return "unknown";
        }

        return "invalid";
      }

      function updateContactInput() {
        const value = contactInput.value;
        const type = detectContactType(value);

        // Remove all classes
        contactInput.classList.remove("valid", "invalid", "pending");

        // Clear previous messages
        contactError.innerHTML = "";
        contactNote.innerHTML = "";

        if (!value) {
          const icon = contactInput.parentElement.querySelector(".input-icon");
          icon.classList.remove("valid", "invalid", "pending");
          icon.className = "fas fa-user input-icon";
          return;
        }

        // Update input styling and icons
        const icon = contactInput.parentElement.querySelector(".input-icon");

        if (type === "email") {
          contactInput.classList.add("valid");
          icon.classList.add("valid");
          icon.className = "fas fa-envelope input-icon valid";
          contactNote.innerHTML = "Valid email format";
        } else if (type === "phone") {
          contactInput.classList.add("valid");
          icon.classList.add("valid");
          icon.className = "fas fa-phone input-icon valid";
          const digits = value.replace(/[^\d]/g, "").length;
          contactNote.innerHTML = `Digits: ${digits}/15 - Valid format`;
        } else if (type === "email_pending") {
          contactInput.classList.add("pending");
          icon.classList.add("pending");
          icon.className = "fas fa-envelope input-icon pending";
          contactNote.innerHTML =
            "Complete your email address (need @ and .domain)";
        } else if (type === "phone_pending") {
          contactInput.classList.add("pending");
          icon.classList.add("pending");
          icon.className = "fas fa-phone input-icon pending";
          const digits = value.replace(/[^\d]/g, "").length;
          contactNote.innerHTML = `Digits: ${digits}/15 - Complete your number`;
        } else if (type === "unknown") {
          contactInput.classList.add("pending");
          icon.classList.add("pending");
          icon.className = "fas fa-question input-icon pending";
          contactNote.innerHTML =
            "Start with + for phone or a letter for email";
        } else if (type === "invalid") {
          contactInput.classList.add("invalid");
          icon.classList.add("invalid");
          icon.className = "fas fa-times input-icon invalid";
          if (value.startsWith("+")) {
            contactError.innerHTML =
              "Invalid phone format. Use + followed by digits only";
          } else {
            contactError.innerHTML =
              "Invalid format. For phone, start with +. For email, use name@domain.com";
          }
        }

        updateSubmitButton();
      }

      function updateSubmitButton() {
        const contactType = detectContactType(contactInput.value);
        const passwordFilled = passwordInput.value.length > 0;

        const isValid =
          passwordFilled &&
          (contactType === "email" || contactType === "phone");
        submitBtn.disabled = !isValid;
      }

      contactInput.addEventListener("input", updateContactInput);
      passwordInput.addEventListener("input", updateSubmitButton);

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const contact = contactInput.value;
        const password = passwordInput.value;

        if (!contact || !password) {
          contactError.innerHTML = "Please fill in all fields";
          return;
        }

        submitBtn.disabled = true;
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<div class="spinner"></div>';

        // Simulate login
        await new Promise((resolve) => setTimeout(resolve, 1500));

        // Redirect to discover page
        window.location.href = "discover.html";
      });

      // Theme Toggle
      const themeToggle = document.querySelector(".theme-toggle");
      const currentTheme = localStorage.getItem("spurtlinks-theme") || "light";
      if (currentTheme === "dark") {
        document.body.classList.add("dark");
        themeToggle.querySelector("i").classList.remove("fa-moon");
        themeToggle.querySelector("i").classList.add("fa-sun");
      }

      themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        localStorage.setItem("spurtlinks-theme", isDark ? "dark" : "light");

        const icon = themeToggle.querySelector("i");
        icon.classList.toggle("fa-moon");
        icon.classList.toggle("fa-sun");
      });

      function togglePassword() {
        const type = passwordInput.type === "password" ? "text" : "password";
        passwordInput.type = type;

        const icon = document
          .getElementById("passwordToggle")
          .querySelector("i");
        icon.classList.toggle("fa-eye");
        icon.classList.toggle("fa-eye-slash");
      }
    </script>
  </body>
</html>
