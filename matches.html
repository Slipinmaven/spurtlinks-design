<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches - SpurtLinks</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light theme (default) */
            --background: 240 6% 4%;
            --foreground: 9 9 11;
            --card: 255 255 255;
            --card-foreground: 9 9 11;
            --popover: 255 255 255;
            --popover-foreground: 9 9 11;
            --primary: 350 89% 60%;
            --primary-foreground: 0 0% 100%;
            --secondary: 240 4.8% 95.9%;
            --secondary-foreground: 240 5.9% 10%;
            --muted: 240 4.8% 95.9%;
            --muted-foreground: 240 3.8% 46.1%;
            --accent: 83 78% 68%;
            --accent-foreground: 0 0% 0%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 0 0% 98%;
            --border: 240 5.9% 90%;
            --input: 240 5.9% 90%;
            --ring: 350 89% 60%;
            --radius: 0.75rem;
            --rose-500: #ec4899;
            --lime-400: #bef264;
            --orange-400: #fb923c;
            
            /* RGB values for rgba usage */
            --background-rgb: 250, 250, 250;
            --card-rgb: 255, 255, 255;
            --muted-rgb: 240, 240, 245;
        }

        .dark {
            --background: 240 6% 4%;
            --foreground: 0 0% 98%;
            --card: 240 6% 10%;
            --card-foreground: 0 0% 98%;
            --popover: 240 6% 10%;
            --popover-foreground: 0 0% 98%;
            --primary: 350 89% 60%;
            --primary-foreground: 0 0% 100%;
            --secondary: 240 4% 16%;
            --secondary-foreground: 0 0% 98%;
            --muted: 240 4% 16%;
            --muted-foreground: 240 5% 64.9%;
            --accent: 83 78% 68%;
            --accent-foreground: 0 0% 0%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 0 0% 98%;
            --border: 240 4% 16%;
            --input: 240 4% 16%;
            --ring: 350 89% 60%;
            
            --background-rgb: 10, 10, 15;
            --card-rgb: 26, 26, 35;
            --muted-rgb: 40, 40, 50;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* Desktop Sidebar */
        .sidebar {
            width: 80px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 40;
            display: flex;
            flex-direction: column;
            border-right: 1px solid hsla(var(--border), 0.5);
            background: hsla(var(--card), 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .logo-area {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid hsla(var(--border), 0.5);
        }

        .logo {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: linear-gradient(to bottom right, var(--rose-500), var(--orange-400));
            box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.25);
            color: white;
        }

        .logo svg {
            width: 24px;
            height: 24px;
        }

        .nav-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 24px 0;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            color: hsl(var(--muted-foreground));
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: hsl(var(--muted));
            color: hsl(var(--foreground));
        }

        .nav-item.active {
            background: hsla(350, 89%, 60%, 0.1);
            color: hsl(var(--primary));
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            width: 4px;
            height: 32px;
            border-radius: 0 4px 4px 0;
            background: hsl(var(--primary));
            animation: slideIn 0.3s ease;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .nav-item .tooltip {
            position: absolute;
            left: 100%;
            margin-left: 12px;
            padding: 6px 12px;
            background: hsl(var(--popover));
            color: hsl(var(--popover-foreground));
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 50;
        }

        .nav-item:hover .tooltip {
            opacity: 1;
        }

        .settings-area {
            padding: 16px;
            border-top: 1px solid hsla(var(--border), 0.5);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 80px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .matches-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: hsl(var(--background));
        }

        header {
            border-bottom: 1px solid hsla(var(--border), 0.5);
            background: hsla(var(--background), 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 24px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            color: hsl(var(--foreground));
        }

        header p {
            font-size: 14px;
            color: hsl(var(--muted-foreground));
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid hsla(var(--border), 0.5);
            background: hsla(var(--background), 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0 24px;
            gap: 24px;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 0;
            background: none;
            border: none;
            color: hsl(var(--muted-foreground));
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            position: relative;
            transition: color 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .tab:hover {
            color: hsl(var(--foreground));
        }

        .tab.active {
            color: hsl(var(--primary));
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: hsl(var(--primary));
            border-radius: 2px 2px 0 0;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            border-radius: 10px;
            background: hsl(var(--primary));
            color: white;
            font-size: 11px;
            font-weight: 700;
        }

        .tab svg {
            width: 18px;
            height: 18px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .content::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: hsla(var(--muted), 0.3);
        }

        .content::-webkit-scrollbar-thumb {
            background: hsla(var(--muted-foreground), 0.3);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: hsla(var(--muted-foreground), 0.5);
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .match-card {
            position: relative;
            aspect-ratio: 3 / 4;
            border-radius: 16px;
            overflow: hidden;
            background: hsl(var(--card));
            cursor: pointer;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .match-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .match-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .match-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 0.8) 0%,
                rgba(0, 0, 0, 0.4) 40%,
                transparent 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
        }

        .match-card-info {
            color: white;
        }

        .match-card-name {
            font-weight: 700;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 4px;
        }

        .match-card-date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .online-badge {
            position: absolute;
            top: 12px;
            right: 12px;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--lime-400);
            border: 2px solid hsl(var(--background));
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .match-card-hover {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, hsla(350, 89%, 60%, 0.9), hsla(83, 78%, 68%, 0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .match-card:hover .match-card-hover {
            opacity: 1;
        }

        .match-card-hover svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .description-text {
            color: hsl(var(--muted-foreground));
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 48px 24px;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            color: hsl(var(--muted-foreground));
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-icon svg {
            width: 64px;
            height: 64px;
        }

        .empty-state h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            font-family: 'Outfit', sans-serif;
            color: hsl(var(--foreground));
        }

        .empty-state p {
            color: hsl(var(--muted-foreground));
            font-size: 14px;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid hsla(var(--border), 0.5);
            transition: background 0.2s;
            cursor: pointer;
            background: hsl(var(--card));
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .conversation-item:hover {
            background: hsl(var(--muted));
        }

        .avatar {
            position: relative;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: hsl(var(--muted));
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--lime-400);
            border: 2px solid hsl(var(--background));
        }

        .conversation-content {
            flex: 1;
            min-width: 0;
        }

        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .conversation-name {
            font-weight: 600;
            font-size: 15px;
            color: hsl(var(--foreground));
            font-family: 'Outfit', sans-serif;
        }

        .conversation-time {
            font-size: 12px;
            color: hsl(var(--muted-foreground));
        }

        .conversation-message {
            font-size: 13px;
            color: hsl(var(--muted-foreground));
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-message.unread {
            color: hsl(var(--foreground));
            font-weight: 600;
        }

        .unread-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            border-radius: 12px;
            padding: 0 8px;
            background: hsl(var(--primary));
            color: white;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Theme toggle */
        .theme-toggle {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: hsl(var(--muted-foreground));
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            border: none;
            margin-top: 8px;
        }

        .theme-toggle:hover {
            background: hsl(var(--muted));
            color: hsl(var(--foreground));
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
        }

        .hidden {
            display: none;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Mobile responsiveness */
        @media (max-width: 1024px) {
            .sidebar {
                display: none;
            }
            
            .main-content {
                margin-left: 0;
            }
        }

        @media (max-width: 600px) {
            .matches-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
            
            .tabs {
                padding: 0 16px;
                gap: 16px;
            }
            
            .tab {
                font-size: 14px;
                padding: 12px 0;
            }
        }
    </style>
</head>
<body>
    <!-- Desktop Sidebar -->
    <aside class="sidebar">
        <div class="logo-area">

    <!-- Main Content -->
    <main class="main-content">

                        <!-- Match Card 2 -->
