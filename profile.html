<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - SpurtLinks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rose-500: #ec4899;
            --rose-600: #be185d;
            --orange-400: #f97316;
            --blue-400: #60a5fa;
            --muted-foreground: #a1a1aa;
            --foreground: #fafafa;
            --background: #09090b;
            --muted: #27272a;
            --card: #18181b;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--foreground);
            line-height: 1.5;
        }

        .profile-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .cover-photo {
            position: relative;
            height: 200px;
            background: linear-gradient(135deg, var(--rose-500) 0%, var(--orange-400) 100%);
            background-size: cover;
            background-position: center;
        }

        @media (min-width: 768px) {
            .cover-photo {
                height: 256px;
            }
        }

        .cover-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
        }

        .cover-actions {
            position: absolute;
            bottom: 16px;
            right: 16px;
            z-index: 5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            color: var(--foreground);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--muted);
        }

        .btn.primary {
            background: var(--rose-500);
            border-color: var(--rose-500);
            color: white;
        }

        .btn.primary:hover {
            background: var(--rose-600);
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        .profile-content {
            position: relative;
            margin-top: -64px;
            padding: 0 24px;
            z-index: 10;
        }

        .avatar-container {
            margin-bottom: 24px;
        }

        .avatar {
            position: relative;
            display: inline-block;
        }

        .avatar-image {
            width: 128px;
            height: 128px;
            border-radius: 50%;
            border: 4px solid var(--background);
            object-fit: cover;
            background: var(--muted);
        }

        .avatar-edit {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--rose-500);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
            transition: all 0.2s;
        }

        .avatar-edit:hover {
            background: var(--rose-600);
            transform: scale(1.1);
        }

        .avatar-edit svg {
            width: 20px;
            height: 20px;
        }

        .profile-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .profile-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-title h1 {
            font-size: 24px;
            font-weight: 700;
        }

        @media (min-width: 768px) {
            .profile-title h1 {
                font-size: 28px;
            }
        }

        .verified-badge {
            width: 24px;
            height: 24px;
            background: var(--blue-400);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        .profile-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 14px;
            color: var(--muted-foreground);
            margin-bottom: 16px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-item svg {
            width: 16px;
            height: 16px;
        }

        .edit-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
        }

        .section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .bio-text {
            color: var(--muted-foreground);
            line-height: 1.6;
            font-size: 14px;
        }

        .interests {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .interest-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(236, 72, 153, 0.1);
            color: var(--rose-500);
            font-size: 13px;
            border: 1px solid rgba(236, 72, 153, 0.2);
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        @media (min-width: 768px) {
            .photos-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            background: var(--muted);
            cursor: pointer;
            group: 'photo';
            transition: transform 0.2s;
        }

        .photo-item:hover {
            transform: scale(1.02);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-add {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border);
            color: var(--muted-foreground);
            transition: all 0.2s;
        }

        .photo-add:hover {
            border-color: var(--rose-500);
            color: var(--rose-500);
            background: rgba(236, 72, 153, 0.05);
        }

        .photo-add svg {
            width: 32px;
            height: 32px;
        }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .photo-item:hover .photo-overlay {
            opacity: 1;
        }

        .photo-delete {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ef4444;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .photo-delete:hover {
            background: #dc2626;
        }

        .photo-delete svg {
            width: 20px;
            height: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--foreground);
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--rose-500);
            background: rgba(13, 13, 13, 0.8);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .edit-form {
            display: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .edit-form.active {
            display: block;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Cover Photo -->
        <div class="cover-photo">
            <div class="cover-overlay"></div>
            <div class="cover-actions">
                <button class="btn" onclick="toggleEdit()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    Change Cover
                </button>
            </div>
        </div>

        <!-- Profile Content -->
        <div class="profile-content">
            <!-- Avatar -->
            <div class="avatar-container">
                <div class="avatar">
                    <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200&h=200&fit=crop" alt="Profile" class="avatar-image">
                    <button class="avatar-edit">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-title">
                    <h1>Alex K., 28</h1>
                    <div class="verified-badge">✓</div>
                </div>
                <button class="btn primary edit-btn" id="editBtn" onclick="toggleEdit()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    <span id="editBtnText">Edit Profile</span>
                </button>
            </div>

            <!-- Meta -->
            <div class="profile-meta">
                <div class="meta-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    San Francisco, CA
                </div>
                <div class="meta-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                    Looking for relationship
                </div>
            </div>

            <!-- Edit Form (Initially Hidden) -->
            <div class="edit-form" id="editForm">
                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" value="Alex K." id="displayName">
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="bioText" placeholder="Tell people about yourself...">Software engineer, dog lover, and avid traveler. Looking for genuine connections.</textarea>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" value="San Francisco, CA" id="location">
                </div>
                <div class="form-group">
                    <label>Looking For</label>
                    <select id="intent">
                        <option value="relationship">Relationship</option>
                        <option value="dating">Dating</option>
                        <option value="friendship">Friendship</option>
                    </select>
                </div>
                <div class="form-group">
                    <button class="btn primary" onclick="saveProfile()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        Save Changes
                    </button>
                </div>
            </div>

            <!-- Bio Section -->
            <div class="section" id="bioSection">
                <h2 class="section-title">About</h2>
                <p class="bio-text">Software engineer, dog lover, and avid traveler. Looking for genuine connections.</p>
            </div>

            <!-- Interests Section -->
            <div class="section">
                <h2 class="section-title">Interests</h2>
                <div class="interests">
                    <div class="interest-tag">Travel</div>
                    <div class="interest-tag">Photography</div>
                    <div class="interest-tag">Hiking</div>
                    <div class="interest-tag">Coffee</div>
                    <div class="interest-tag">Tech</div>
                    <div class="interest-tag">Dogs</div>
                </div>
            </div>

            <!-- Photos Section -->
            <div class="section">
                <h2 class="section-title">Photos</h2>
                <div class="photos-grid">
                    <div class="photo-item">
                        <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200&h=200&fit=crop" alt="Photo 1">
                        <div class="photo-overlay">
                            <button class="photo-delete">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="photo-item">
                        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&h=200&fit=crop" alt="Photo 2">
                        <div class="photo-overlay">
                            <button class="photo-delete">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button class="photo-item photo-add">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleEdit() {
            const form = document.getElementById('editForm');
            const bioSection = document.getElementById('bioSection');
            const editBtn = document.getElementById('editBtn');
            
            form.classList.toggle('active');
            bioSection.classList.toggle('hidden');
            editBtn.textContent = form.classList.contains('active') ? 'Cancel' : 'Edit Profile';
        }

        function saveProfile() {
            alert('Profile updated successfully!');
            toggleEdit();
        }
    </script>
</body>
</html>
