<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify - SpurtLinks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: 240 6% 4%;
            --foreground: 0 0% 98%;
            --card: 240 6% 10%;
            --primary: 350 89% 60%;
            --muted-foreground: 240 5% 64.9%;
            --border: 240 4% 16%;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .verify-container {
            width: 100%;
            max-width: 420px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: hsl(var(--foreground));
        }

        .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, hsl(350, 89%, 60%), hsl(29, 97%, 60%));
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.25);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
        }

        .icon-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(236, 72, 153, 0.1);
            margin: 2rem auto;
            border: 2px solid rgba(236, 72, 153, 0.3);
        }

        .icon-circle-content {
            font-size: 40px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .form-header p {
            color: hsl(var(--muted-foreground));
            font-size: 15px;
            line-height: 1.5;
        }

        .form-header strong {
            color: hsl(var(--foreground));
            font-weight: 600;
        }

        .otp-section {
            margin-bottom: 2rem;
        }

        .otp-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: hsl(var(--foreground));
        }

        .otp-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .otp-input {
            width: 50px;
            height: 50px;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid hsl(var(--border));
            border-radius: 8px;
            background: hsl(var(--card));
            color: hsl(var(--foreground));
            text-align: center;
            transition: all 0.2s;
        }

        .otp-input:focus {
            outline: none;
            border-color: hsl(var(--primary));
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
        }

        .otp-input.filled {
            border-color: hsl(var(--primary));
        }

        .verify-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, hsl(350, 89%, 60%), hsl(29, 97%, 60%));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .verify-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.3);
        }

        .verify-button:active {
            transform: translateY(0);
        }

        .verify-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .resend-section {
            text-align: center;
        }

        .resend-text {
            color: hsl(var(--muted-foreground));
            font-size: 14px;
            margin-bottom: 8px;
        }

        .resend-button {
            background: transparent;
            border: none;
            color: hsl(var(--primary));
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
            text-decoration: underline;
        }

        .resend-button:hover {
            opacity: 0.8;
        }

        .resend-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .success-message {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: hsl(142, 76%, 36%);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 1rem;
            text-align: center;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: hsl(0, 84.2%, 60.2%);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 1rem;
            text-align: center;
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="logo-section">
            <a href="/" class="logo-link">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L3 7V12C3 19.7 12 22 12 22S21 19.7 21 12V7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M7 12L10 15L17 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="logo-text">SpurtLinks</span>
            </a>
        </div>

        <div class="icon-circle">
            <div class="icon-circle-content">📧</div>
        </div>

        <div class="form-header">
            <h1>Verify your email</h1>
            <p>We've sent a 6-digit code to <strong>sa***h@example.com</strong></p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage">✓ Email verified successfully!</div>

        <div class="otp-section">
            <label class="otp-label">Verification Code</label>
            <div class="otp-inputs">
                <input type="text" class="otp-input" maxlength="1" data-index="0" inputmode="numeric" autocomplete="off">
                <input type="text" class="otp-input" maxlength="1" data-index="1" inputmode="numeric" autocomplete="off">
                <input type="text" class="otp-input" maxlength="1" data-index="2" inputmode="numeric" autocomplete="off">
                <input type="text" class="otp-input" maxlength="1" data-index="3" inputmode="numeric" autocomplete="off">
                <input type="text" class="otp-input" maxlength="1" data-index="4" inputmode="numeric" autocomplete="off">
                <input type="text" class="otp-input" maxlength="1" data-index="5" inputmode="numeric" autocomplete="off">
            </div>
        </div>

        <button class="verify-button" id="verifyBtn" onclick="handleVerify()">Verify Email</button>

        <div class="resend-section">
            <p class="resend-text">Didn't receive the code?</p>
            <button class="resend-button" id="resendBtn" onclick="handleResend()">Resend Code</button>
        </div>
    </div>

    <script>
        const otpInputs = document.querySelectorAll('.otp-input');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        let resendTimeout = null;

        // OTP Input handling
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value;
                if (!/^\d?$/.test(value)) {
                    e.target.value = '';
                    return;
                }

                if (value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }

                updateVerifyButton();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    otpInputs[index - 1].focus();
                } else if (e.key === 'ArrowRight' && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                } else if (e.key === 'ArrowLeft' && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = (e.clipboardData || window.clipboardData).getData('text');
                const digits = pastedData.replace(/\D/g, '');
                
                for (let i = 0; i < Math.min(digits.length, otpInputs.length - index); i++) {
                    otpInputs[index + i].value = digits[i];
                    if (index + i < otpInputs.length - 1) {
                        otpInputs[index + i + 1].focus();
                    }
                }
                updateVerifyButton();
            });
        });

        function updateVerifyButton() {
            const otp = getOTP();
            verifyBtn.disabled = otp.length !== 6;
        }

        function getOTP() {
            return Array.from(otpInputs).map(input => input.value).join('');
        }

        function handleVerify() {
            const otp = getOTP();
            if (otp.length !== 6) {
                showError('Please enter the complete verification code');
                return;
            }

            errorMessage.classList.remove('show');
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';

            // Simulate API call
            setTimeout(() => {
                if (otp !== '000000') {
                    successMessage.classList.add('show');
                    verifyBtn.textContent = 'Verified ✓';
                    verifyBtn.style.background = 'linear-gradient(135deg, hsl(142, 76%, 36%), hsl(142, 71%, 45%))';
                } else {
                    showError('Invalid verification code');
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = 'Verify Email';
                }
            }, 1000);
        }

        function handleResend() {
            resendBtn.disabled = true;
            resendBtn.textContent = 'Resending...';
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            setTimeout(() => {
                resendBtn.disabled = false;
                resendBtn.textContent = 'Resend Code';
            }, 1500);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 4000);
        }

        // Focus first input on load
        otpInputs[0].focus();
        updateVerifyButton();
    </script>
</body>
</html>
