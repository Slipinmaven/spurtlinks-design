<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SpurtLinks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rose-500: #ec4899;
            --rose-600: #be185d;
            --orange-400: #f97316;
            --lime-400: #84cc16;
            --muted-foreground: #a1a1aa;
            --foreground: #fafafa;
            --background: #09090b;
            --muted: #27272a;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, rgba(15, 23, 42, 0.8) 100%);
            color: var(--foreground);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 48px;
            text-decoration: none;
            color: var(--foreground);
        }

        .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--rose-500) 0%, var(--orange-400) 100%);
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.25);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .icon-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .icon-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(236, 72, 153, 0.1);
        }

        .mail-icon {
            width: 40px;
            height: 40px;
            color: var(--rose-500);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--muted-foreground);
            font-size: 14px;
            line-height: 1.5;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 32px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label {
            font-size: 14px;
            font-weight: 500;
            color: var(--foreground);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            width: 20px;
            height: 20px;
            color: var(--muted-foreground);
            pointer-events: none;
        }

        .input {
            width: 100%;
            height: 48px;
            padding: 0 48px 0 48px;
            border: 1px solid transparent;
            border-radius: 24px;
            background: rgba(39, 39, 42, 0.5);
            color: var(--foreground);
            font-size: 14px;
            transition: all 0.2s;
        }

        .input:hover {
            background: rgba(39, 39, 42, 0.8);
        }

        .input:focus {
            outline: none;
            background: var(--background);
            border-color: var(--rose-500);
        }

        .error {
            color: #ef4444;
            font-size: 12px;
        }

        .submit-btn {
            height: 48px;
            border-radius: 24px;
            background: var(--rose-500);
            color: white;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.25);
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--rose-600);
            box-shadow: 0 12px 30px rgba(236, 72, 153, 0.35);
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .back-link {
            text-align: center;
            margin-top: 32px;
        }

        .back-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted-foreground);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--foreground);
        }

        .arrow-icon {
            width: 16px;
            height: 16px;
        }

        /* Success State */
        .success-container {
            text-align: center;
            animation: fadeInUp 0.5s ease-out;
        }

        .success-icon-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .success-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(132, 204, 22, 0.1);
        }

        .check-icon {
            width: 40px;
            height: 40px;
            color: var(--lime-400);
        }

        .success-header h1 {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .success-header p {
            color: var(--muted-foreground);
            font-size: 14px;
        }

        .email-highlight {
            color: var(--foreground);
            font-weight: 600;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
        }

        .open-email-btn {
            height: 48px;
            border-radius: 24px;
            background: var(--rose-500);
            color: white;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.25);
        }

        .open-email-btn:hover {
            background: var(--rose-600);
            box-shadow: 0 12px 30px rgba(236, 72, 153, 0.35);
        }

        .back-btn {
            height: 48px;
            border-radius: 24px;
            background: transparent;
            color: var(--foreground);
            border: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: var(--rose-500);
            color: var(--rose-500);
            background: rgba(236, 72, 153, 0.05);
        }

        .hint {
            margin-top: 32px;
            font-size: 12px;
            color: var(--muted-foreground);
        }

        .hint button {
            background: none;
            border: none;
            color: var(--rose-500);
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        .hint button:hover {
            color: var(--rose-600);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Form State -->
        <div id="formState" class="form-state">
            <a href="javascript:void(0)" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px; color: white;">
                        <path d="M9.59 0h1.42a2 2 0 0 1 1.94 2.5l-.5 2a2 2 0 0 0 1.86 2.5h1.38a2 2 0 0 1 1.94 2.5l-.5 2a2 2 0 0 0 1.86 2.5h.3a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-1a2 2 0 0 0-2-2h-1a2 2 0 0 1-2 2v1a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-1a2 2 0 0 1 2-2h.3a2 2 0 0 0 1.86-2.5l-.5-2A2 2 0 0 1 9.59 0Z"></path>
                    </svg>
                </div>
                <span class="logo-text">SpurtLinks</span>
            </a>

            <div class="icon-container">
                <div class="icon-circle">
                    <svg class="mail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                    </svg>
                </div>
            </div>

            <div class="header">
                <h1>Forgot password?</h1>
                <p>No worries, we'll send you reset instructions.</p>
            </div>

            <form class="form" id="forgotForm">
                <div class="form-group">
                    <label class="label" for="email">Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                        </svg>
                        <input type="email" id="email" placeholder="you@example.com" class="input" required>
                    </div>
                    <div class="error" id="emailError"></div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="buttonText">Reset Password</span>
                    <svg id="buttonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>

            <div class="back-link">
                <a href="javascript:void(0)" onclick="showForm()">
                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to login
                </a>
            </div>
        </div>

        <!-- Success State -->
        <div id="successState" class="success-container hidden">
            <div class="success-icon-container">
                <div class="success-circle">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
            </div>

            <div class="success-header">
                <h1>Check your email</h1>
                <p>We've sent a password reset link to <span class="email-highlight" id="displayEmail">you@example.com</span></p>
            </div>

            <div class="button-group">
                <button class="open-email-btn" onclick="openEmail()">
                    Open Email App
                </button>
                <button class="back-btn" onclick="showForm()">
                    <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Login
                </button>
            </div>

            <p class="hint">
                Didn't receive the email? Check your spam folder or <button onclick="showForm()">try again</button>
            </p>
        </div>
    </div>

    <script>
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const emailError = document.getElementById('emailError');
            
            if (!email) {
                emailError.textContent = 'Email is required';
                return;
            }

            if (!emailRegex.test(email)) {
                emailError.textContent = 'Please enter a valid email';
                return;
            }

            emailError.textContent = '';

            const submitBtn = document.getElementById('submitBtn');
            const buttonText = document.getElementById('buttonText');
            const buttonIcon = document.getElementById('buttonIcon');
            
            submitBtn.disabled = true;
            buttonText.textContent = '';
            buttonIcon.innerHTML = '<circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" class="spinner"></circle>';

            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 1500));

            document.getElementById('displayEmail').textContent = email;
            showSuccess();

            submitBtn.disabled = false;
        });

        function showSuccess() {
            document.getElementById('formState').classList.add('hidden');
            document.getElementById('successState').classList.remove('hidden');
        }

        function showForm() {
            document.getElementById('successState').classList.add('hidden');
            document.getElementById('formState').classList.remove('hidden');
            document.getElementById('email').value = '';
            document.getElementById('emailError').textContent = '';
            document.getElementById('submitBtn').disabled = false;
            const buttonText = document.getElementById('buttonText');
            const buttonIcon = document.getElementById('buttonIcon');
            buttonText.textContent = 'Reset Password';
            buttonIcon.innerHTML = '<line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>';
        }

        function openEmail() {
            window.open('https://mail.google.com', '_blank');
        }
    </script>
</body>
</html>
