<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - SpurtLinks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: #0f172a;
            --surface: #1e293b;
            --foreground: #f1f5f9;
            --muted-foreground: #cbd5e1;
            --muted: rgba(30, 41, 59, 0.5);
            --rose-500: #ec4899;
            --lime-400: #84cc16;
            --blue-400: #60a5fa;
            --border: rgba(203, 213, 225, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: var(--background);
            color: var(--foreground);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: row;
        }

        .sidebar {
            display: none;
            width: 80px;
            height: 100vh;
            border-right: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 0;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 40;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        @media (min-width: 1024px) {
            .sidebar {
                display: flex;
            }
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 0 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 8px;
            color: var(--muted-foreground);
            text-decoration: none;
            transition: all 0.2s;
            width: 56px;
            height: 56px;
            cursor: pointer;
        }

        .nav-item:hover {
            background: var(--surface);
            color: var(--foreground);
        }

        .nav-item.active {
            color: var(--rose-500);
            background: rgba(236, 72, 153, 0.1);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-left: 0;
        }

        @media (min-width: 1024px) {
            .main-content {
                margin-left: 80px;
            }
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 10;
            min-height: 60px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--foreground);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: var(--surface);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        @media (min-width: 1024px) {
            .back-btn {
                display: none !important;
            }
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .avatar {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .online-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--lime-400);
            border: 2px solid var(--background);
        }

        .user-details {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex: 1;
        }

        .user-details h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .user-details p {
            font-size: 12px;
            color: var(--muted-foreground);
        }

        .header-actions {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--muted-foreground);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
        }

        .icon-btn:hover {
            color: var(--foreground);
            background: var(--surface);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.2);
            border-radius: 4px;
        }

        .messages-inner {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .match-info {
            text-align: center;
            padding: 32px 16px;
            margin-bottom: 16px;
        }

        .match-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 16px;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .match-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .match-info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .match-info p {
            font-size: 14px;
            color: var(--muted-foreground);
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.from-me {
            justify-content: flex-end;
        }

        .message-group {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            max-width: 80%;
        }

        .message.from-me .message-group {
            flex-direction: row-reverse;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .from-me .message-bubble {
            background: var(--rose-500);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .from-other .message-bubble {
            background: var(--surface);
            color: var(--foreground);
            border-bottom-left-radius: 4px;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-time-group {
            display: flex;
            gap: 4px;
            align-items: center;
            font-size: 12px;
            color: var(--muted-foreground);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .message-time-group {
            opacity: 1;
        }

        .check-single {
            width: 12px;
            height: 12px;
        }

        .check-double {
            width: 14px;
            height: 14px;
            color: var(--blue-400);
        }

        .typing-group {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            max-width: 80%;
        }

        .typing-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .typing-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .typing-bubble {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
            border-radius: 20px;
            background: var(--surface);
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted-foreground);
            animation: bounce 1.4s infinite;
        }

        .typing-dot:nth-child(1) {
            animation-delay: 0ms;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-section {
            border-top: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 16px;
        }

        .input-inner {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .input-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--muted-foreground);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: var(--surface);
            color: var(--foreground);
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
            position: relative;
        }

        .message-input {
            flex: 1;
            padding: 12px 40px 12px 16px;
            border: 1px solid transparent;
            border-radius: 24px;
            background: var(--muted);
            color: var(--foreground);
            font-size: 15px;
            resize: none;
            max-height: 100px;
            transition: all 0.2s;
            font-family: inherit;
            min-height: 48px;
            line-height: 1.4;
        }

        .message-input::placeholder {
            color: var(--muted-foreground);
        }

        .message-input:focus {
            outline: none;
            border-color: var(--rose-500);
            background: rgba(30, 41, 59, 0.7);
        }

        .emoji-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted-foreground);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            pointer-events: auto;
        }

        .emoji-btn:hover {
            color: var(--foreground);
            background: var(--surface);
        }

        .emoji-btn svg {
            width: 18px;
            height: 18px;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            padding: 0;
            background: var(--rose-500);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.25);
        }

        .send-btn:hover:not(:disabled) {
            background: #d946a6;
            box-shadow: 0 6px 16px rgba(236, 72, 153, 0.35);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
        }

        .dropdown-container {
            position: relative;
        }

        .menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 200px;
            overflow: hidden;
            z-index: 20;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 16px;
            background: none;
            border: none;
            color: var(--foreground);
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            text-align: left;
            font-family: inherit;
        }

        .menu-item:hover {
            background: rgba(203, 213, 225, 0.1);
        }

        .menu-item.danger {
            color: #ef4444;
        }

        .menu-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

    <div class="main-content">
        <header>
            <div class="header-left">
                <button class="back-btn" onclick="goBack()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    <script>
        const mockUser = {
            name: 'Sarah Kimani',
            avatar: 'https://images.unsplash.com/photo-1494790108777-296ef5a5e8d6?w=100&h=100&fit=crop',
            online: true,
            matchedAt: new Date(Date.now() - 172800000)
        };

        let messages = [
            { id: '1', text: 'Hey! How are you?', fromMe: false, sentAt: new Date(Date.now() - 3600000), read: true },
            { id: '2', text: 'I\'m doing great! How about you?', fromMe: true, sentAt: new Date(Date.now() - 3300000), read: true },
            { id: '3', text: 'Living my best life! 😊', fromMe: false, sentAt: new Date(Date.now() - 1800000), read: true },
            { id: '4', text: 'That sounds amazing! 🎉', fromMe: true, sentAt: new Date(Date.now() - 1500000), read: true }
        ];

        let isTyping = false;

        function formatTime(date) {
            return new Date(date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer').querySelector('.messages-inner');
            const messagesHTML = messages.map(msg => `
                <div class="message ${msg.fromMe ? 'from-me' : ''}">
                    <div class="message-group">
                        ${!msg.fromMe ? `
                            <div class="message-avatar">
                                <img src="${mockUser.avatar}" alt="${mockUser.name}">
                            </div>
                        ` : ''}
                        <div>
                            <div class="message-bubble">${msg.text}</div>
                        </div>
                        ${msg.fromMe ? `
                            <div class="message-time-group">
                                <span>${formatTime(msg.sentAt)}</span>
                                ${msg.read ? 
                                    `<svg class="check-double" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M3 14l4 4 8-11M2 15l3 3 10-13"/>
                                    </svg>` : 
                                    `<svg class="check-single" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M5 12l4 4l8-11"/>
                                    </svg>`
                                }
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="match-info">
                    <div class="match-avatar">
                        <img src="${mockUser.avatar}" alt="${mockUser.name}">
                    </div>
                    <h3>You matched with ${mockUser.name}</h3>
                    <p>2 days ago</p>
                </div>
                ${messagesHTML}
            `;

            setTimeout(() => {
                document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
            }, 0);
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;

            messages.push({
                id: 'msg_' + Date.now(),
                text: text,
                fromMe: true,
                sentAt: new Date(),
                read: false
            });

            input.value = '';
            updateSendButton();
            renderMessages();

            setTimeout(() => {
                isTyping = true;
                renderMessages();
                
                setTimeout(() => {
                    isTyping = false;
                    const replies = [
                        "That sounds great! 😊",
                        "I'd love that!",
                        "When are you free?",
                        "Tell me more!",
                        "Haha, that's funny 😄"
                    ];
                    
                    messages.push({
                        id: 'msg_' + Date.now(),
                        text: replies[Math.floor(Math.random() * replies.length)],
                        fromMe: false,
                        sentAt: new Date(),
                        read: true
                    });

                    renderMessages();
                }, 1500);
            }, 1000);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (document.getElementById('messageInput').value.trim()) {
                    sendMessage();
                }
            }
        }

        function updateSendButton() {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            btn.disabled = !input.value.trim();
        }

        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('hidden');
        }

        function handleMenuAction(action) {
            toggleMenu();
            const actions = {
                'profile': 'Opening profile for ' + mockUser.name,
                'mute': 'Notifications muted',
                'block': 'User blocked',
                'report': 'User reported'
            };
            if (actions[action]) {
                console.log(actions[action]);
            }
        }

        function goBack() {
            console.log('Going back to matches');
        }

        function viewProfile(e) {
            e.preventDefault();
            console.log('Opening profile for ' + mockUser.name);
        }

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('menu');
            if (!e.target.closest('.dropdown-container')) {
                menu.classList.add('hidden');
            }
        });

        document.getElementById('messageInput').addEventListener('input', updateSendButton);

        renderMessages();
    </script>
</body>
</html>
